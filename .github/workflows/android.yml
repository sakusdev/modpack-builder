name: Android APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run unit tests
        shell: bash
        run: |
          gradle --no-daemon :app:testDebugUnitTest > gradle-test.log 2>&1 || {
            tail -n 100 gradle-test.log
            exit 1
          }
          tail -n 30 gradle-test.log

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PackDroid-gradle-test-log
          path: gradle-test.log
          if-no-files-found: warn

      - name: Build debug APK
        shell: bash
        run: |
          gradle --no-daemon :app:assembleDebug > gradle-build.log 2>&1 || {
            tail -n 100 gradle-build.log
            exit 1
          }
          tail -n 30 gradle-build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PackDroid-gradle-build-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PackDroid-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
